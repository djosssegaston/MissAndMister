services:
  - type: web
    runtime: docker
    name: missandmister-api-djosssegaston
    branch: main
    plan: free
    region: frankfurt
    autoDeployTrigger: commit
    healthCheckPath: /up
    rootDir: backend/laravel
    dockerfilePath: ./backend/laravel/Dockerfile
    dockerContext: ./backend/laravel
    envVars:
      - key: APP_NAME
        value: MissAndMister
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://missandmister-api-djosssegaston.onrender.com
      - key: FRONTEND_URL
        value: https://missandmister-front-djosssegaston.onrender.com
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: info
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        value: trolley.proxy.rlwy.net
      - key: DB_PORT
        value: "28518"
      - key: DB_DATABASE
        value: railway
      - key: DB_USERNAME
        value: root
      - key: DB_PASSWORD
        sync: false
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: sync
      - key: FILESYSTEM_DISK
        value: local
      - key: MEDIA_DRIVER
        value: cloudinary
      - key: CLOUDINARY_URL
        sync: false
      - key: CLOUDINARY_FOLDER
        value: missandmister
      - key: MAIL_MAILER
        value: log
      - key: MAIL_FROM_ADDRESS
        value: djossegaston7@gmail.com
      - key: MAIL_FROM_NAME
        value: MissAndMister
      - key: CORS_ALLOWED_ORIGINS
        value: https://missandmister-front-djosssegaston.onrender.com
      - key: CORS_ALLOWED_ORIGINS_PATTERN
        value: ""
      - key: SANCTUM_STATEFUL_DOMAINS
        value: missandmister-front-djosssegaston.onrender.com
      - key: CANDIDATE_IMAGE_ASYNC_PROCESSING
        value: "false"
      - key: CANDIDATE_IMAGE_FACE_PROVIDER
        value: none
      - key: VIDEO_UPLOAD_MAX_MB
        value: "100"
      - key: PROD_ADMIN_NAME
        value: Adechina
      - key: PROD_ADMIN_EMAIL
        value: djossegaston7@gmail.com
      - key: PROD_ADMIN_PHONE
        value: 0168552584
      - key: PROD_ADMIN_PASSWORD
        sync: false
      - key: PROD_ADMIN_ROLE
        value: superadmin
      - key: PROD_ADMIN_STATUS
        value: active
      - key: KKIAPAY_PUBLIC_KEY
        sync: false
      - key: KKIAPAY_PRIVATE_KEY
        sync: false
      - key: KKIAPAY_SECRET
        sync: false
      - key: KKIAPAY_WEBHOOK_SECRET
        sync: false

  - type: web
    runtime: static
    name: missandmister-front-djosssegaston
    branch: main
    autoDeployTrigger: commit
    rootDir: frontend/missandmisterfront
    buildCommand: npm ci && npm run build
    staticPublishPath: ./frontend/missandmisterfront/dist
    envVars:
      - key: VITE_API_URL
        value: https://missandmister-api-djosssegaston.onrender.com/api
      - key: VITE_MAX_VIDEO_UPLOAD_MB
        value: "100"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
